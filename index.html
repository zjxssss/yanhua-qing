<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>祝晴晴生日快乐！！！！</title>
  <style>
    :root {
      --bg-top: #fff9fc;
      --bg-bottom: #ffdce9;
      --accent: #f47ca8;
      --accent-deep: #de5d90;
      --accent-soft: #ffe7f0;
      --text: #6e4e62;
      --text-strong: #5d3c53;
      --glass: rgba(255, 255, 255, 0.74);
      --cake-cream: #fffefe;
      --cake-pink-soft: #fff5f9;
      --cake-pink-stripe: #f7c6d7;
      --cake-pink-deep: #ecabc3;
      --cake-pink-shadow: #fdebf2;
      --cake-icing-shadow: #f9d9e5;
      --cake-outline: #f8dbe6;
      --cake-choco: #8e5a48;
      --cake-choco-deep: #6c4032;
      --cake-choco-soft: #c99e8d;
      --cake-blue-soft: #c6e8ff;
      --cake-blue-deep: #8ecbf2;
      --cake-shadow: rgba(203, 132, 163, 0.24);
      --candle-blue: #a7d8ff;
      --candle-yellow: #ffc94a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.92), transparent 22%),
        radial-gradient(circle at 84% 10%, rgba(255, 214, 232, 0.82), transparent 22%),
        radial-gradient(circle at 50% 42%, rgba(255, 199, 221, 0.34), transparent 34%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }

    body {
      position: relative;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 12% 20%, rgba(255, 255, 255, 0.88), transparent 2px),
        radial-gradient(circle at 76% 14%, rgba(255, 255, 255, 0.92), transparent 2px),
        radial-gradient(circle at 62% 28%, rgba(255, 240, 247, 0.88), transparent 2px),
        radial-gradient(circle at 32% 12%, rgba(255, 255, 255, 0.92), transparent 1.5px),
        radial-gradient(circle at 88% 36%, rgba(255, 236, 246, 0.82), transparent 2px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0));
      opacity: 0.9;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 24% 74%, rgba(255, 186, 214, 0.24), transparent 20%),
        radial-gradient(circle at 74% 72%, rgba(255, 255, 255, 0.34), transparent 24%);
      pointer-events: none;
      z-index: 0;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.82), transparent 26%),
        linear-gradient(180deg, rgba(255, 246, 251, 0.66), rgba(255, 222, 234, 0.8));
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }

    .intro-screen.exit {
      opacity: 0;
      visibility: hidden;
    }

    .intro-screen.cinematic-exit {
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.96), transparent 24%),
        linear-gradient(180deg, rgba(255, 244, 249, 0.86), rgba(255, 224, 235, 0.94));
    }

    .intro-screen.cinematic-exit .intro-card {
      animation: intro-card-lift 1.12s cubic-bezier(0.22, 0.92, 0.3, 1) forwards;
    }

    .intro-screen.cinematic-exit .cake-scene {
      animation: cake-launch 1.02s cubic-bezier(0.18, 0.9, 0.32, 1) forwards;
    }

    .intro-card {
      position: relative;
      width: min(92vw, 420px);
      padding: 24px 22px 30px;
      border-radius: 30px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 244, 249, 0.92));
      border: 1px solid rgba(244, 124, 168, 0.2);
      box-shadow: 0 26px 60px rgba(212, 125, 160, 0.24);
      backdrop-filter: blur(14px);
    }

    .intro-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.44), transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(255, 195, 220, 0.3), transparent 18%);
      pointer-events: none;
    }

    .intro-card>* {
      position: relative;
      z-index: 1;
    }

    .intro-avatar {
      width: 92px;
      height: 92px;
      margin: 0 auto 14px;
      border-radius: 28px;
      overflow: hidden;
      border: 4px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 34px rgba(212, 125, 160, 0.26);
    }

    .intro-avatar img,
    .title-avatar img,
    .letter-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .intro-card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 5vw, 2.3rem);
      color: var(--text-strong);
      letter-spacing: 0.08em;
    }

    .intro-card p {
      margin: 0 0 18px;
      font-size: 0.98rem;
      line-height: 1.7;
      color: rgba(110, 78, 98, 0.82);
    }

    .cake-button {
      position: relative;
      width: min(100%, 300px);
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: inherit;
      appearance: none;
      transition: transform 0.28s ease;
    }

    .cake-button:not(:disabled):hover,
    .cake-button:not(:disabled):focus-visible {
      transform: translateY(-4px) scale(1.01);
      outline: none;
    }

    .cake-button:disabled {
      cursor: default;
    }

    .cake-scene {
      position: relative;
      width: 100%;
      height: 250px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      filter: drop-shadow(0 18px 30px rgba(0, 0, 0, 0.28));
      overflow: visible;
    }

    .cake-shadow {
      position: absolute;
      bottom: 18px;
      width: 190px;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 168, 195, 0.42), transparent 72%);
      opacity: 0;
      transform: scale(0.42);
    }

    .cake-button.show-shadow .cake-shadow {
      opacity: 1;
      transform: scale(1);
      animation: none;
    }

    .plate {
      position: absolute;
      bottom: 22px;
      width: 210px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, #f7dbe8);
      box-shadow: 0 10px 18px rgba(220, 164, 187, 0.16);
      opacity: 0;
      transform: translateY(0) scaleX(1);
    }

    .cake-button.show-plate .plate {
      opacity: 1;
      transform: translateY(0) scaleX(1);
      animation: none;
    }

    .cake-base {
      position: absolute;
      bottom: 35px;
      width: 182px;
      height: 110px;
      pointer-events: none;
      filter: drop-shadow(0 8px 12px rgba(231, 171, 193, 0.18));
    }

    .cake-layer {
      position: absolute;
      left: 50%;
      opacity: 0;
      transform: translateX(-50%) translateY(0) scale(1);
      transform-origin: center bottom;
      background:
        linear-gradient(180deg,
          rgba(255, 255, 255, 0.98) 0 18%,
          rgba(255, 245, 249, 0.98) 18% 42%,
          var(--cake-pink-stripe) 42% 52%,
          rgba(255, 248, 251, 0.98) 52% 72%,
          var(--cake-pink-deep) 72% 82%,
          rgba(255, 244, 248, 0.98) 82% 100%);
      box-shadow:
        0 16px 24px rgba(220, 154, 184, 0.2),
        inset 0 -10px 0 rgba(248, 214, 226, 0.68),
        inset 0 8px 0 rgba(255, 255, 255, 0.84),
        inset 14px 0 18px rgba(255, 255, 255, 0.2),
        inset -14px 0 18px rgba(226, 160, 188, 0.16);
      border: 1px solid var(--cake-outline);
      overflow: hidden;
      will-change: transform, opacity;
    }

    .cake-layer::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 22px;
      background:
        radial-gradient(circle at 10% 100%, rgba(255, 255, 255, 0.98) 11px, transparent 12px),
        radial-gradient(circle at 24% 100%, rgba(255, 255, 255, 0.98) 13px, transparent 14px),
        radial-gradient(circle at 40% 100%, rgba(255, 255, 255, 0.98) 11px, transparent 12px),
        radial-gradient(circle at 56% 100%, rgba(255, 255, 255, 0.98) 13px, transparent 14px),
        radial-gradient(circle at 72% 100%, rgba(255, 255, 255, 0.98) 11px, transparent 12px),
        radial-gradient(circle at 88% 100%, rgba(255, 255, 255, 0.98) 13px, transparent 14px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.99), var(--cake-pink-shadow));
      opacity: 1;
      box-shadow: inset 0 -2px 0 rgba(245, 204, 218, 0.3);
    }

    .cake-layer::after {
      content: "";
      position: absolute;
      inset: auto 0 7px;
      height: 14px;
      border-radius: 0;
      background:
        linear-gradient(180deg,
          rgba(255, 241, 247, 0.26) 0 12%,
          var(--cake-pink-stripe) 12% 44%,
          rgba(255, 247, 250, 0.72) 44% 58%,
          var(--cake-pink-deep) 58% 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.42);
    }

    .cake-button.show-bottom .cake-layer.bottom,
    .cake-button.show-middle .cake-layer.middle,
    .cake-button.show-top .cake-layer.top {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      animation: none;
    }

    .cake-layer.bottom {
      bottom: 0;
      width: 176px;
      height: 44px;
      border-radius: 18px 18px 26px 26px;
    }

    .cake-layer.middle {
      bottom: 28px;
      width: 146px;
      height: 34px;
      border-radius: 16px 16px 22px 22px;
    }

    .cake-layer.top {
      bottom: 54px;
      width: 120px;
      height: 28px;
      border-radius: 14px 14px 18px 18px;
    }

    .sprinkles span {
      position: absolute;
      width: 12px;
      height: 6px;
      border-radius: 999px;
      opacity: 0.85;
      box-shadow: none;
    }

    .sprinkles span:nth-child(1) {
      top: 18px;
      left: 20px;
      background: #ffd46e;
      transform: rotate(24deg);
    }

    .sprinkles span:nth-child(2) {
      top: 24px;
      left: 58px;
      background: #ff8db6;
      transform: rotate(-16deg);
    }

    .sprinkles span:nth-child(3) {
      top: 20px;
      right: 54px;
      background: #8bcaff;
      transform: rotate(14deg);
    }

    .sprinkles span:nth-child(4) {
      top: 28px;
      right: 24px;
      background: #ffffff;
      transform: rotate(-28deg);
    }

    .sprinkles span:nth-child(5) {
      top: 30px;
      left: 92px;
      background: #ffdfe9;
      transform: rotate(22deg);
    }

    .candles {
      position: absolute;
      left: 50%;
      bottom: 112px;
      width: 130px;
      height: 82px;
      opacity: 0;
      transform: translateX(-50%) translateY(0) scale(1);
      z-index: 4;
    }

    .cake-button.show-candles .candles {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      animation: none;
    }

    .candle {
      position: absolute;
      bottom: -8px;
      width: 16px;
      height: 46px;
      border-radius: 10px 10px 6px 6px;
      background:
        repeating-linear-gradient(90deg,
          rgba(255, 255, 255, 0.98) 0 3px,
          var(--candle-blue) 3px 7px,
          #d8f1ff 7px 11px,
          var(--cake-blue-deep) 11px 14px);
      box-shadow:
        inset 0 -6px 0 rgba(97, 151, 191, 0.18),
        inset 0 4px 0 rgba(255, 255, 255, 0.7),
        0 6px 10px rgba(142, 191, 226, 0.16);
    }

    .candle::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 1px;
      width: 22px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 250, 251, 0.98), rgba(248, 214, 227, 0.92));
      transform: translateX(-50%);
      box-shadow:
        0 2px 4px rgba(226, 176, 197, 0.18),
        inset 0 -1px 0 rgba(229, 171, 196, 0.24);
    }

    .candle:nth-child(1) {
      left: 10px;
    }

    .candle:nth-child(2) {
      left: 58px;
      height: 50px;
    }

    .candle:nth-child(3) {
      right: 10px;
    }

    .wick {
      position: absolute;
      left: 50%;
      top: -8px;
      width: 2px;
      height: 10px;
      background: #3d2c1d;
      transform: translateX(-50%);
    }

    .flame {
      position: absolute;
      left: 50%;
      top: -28px;
      width: 16px;
      height: 26px;
      border-radius: 55% 55% 45% 45%;
      background:
        radial-gradient(circle at 50% 65%, #fff6ce 0 26%, #fff6ce 30%, transparent 31%),
        radial-gradient(circle at 50% 64%, var(--candle-yellow), #ff8a3d 68%, transparent 70%);
      transform: translateX(-50%);
      transform-origin: 50% 100%;
      filter: drop-shadow(0 0 10px rgba(255, 204, 99, 0.65));
      opacity: 0;
    }

    .cake-button.lighting .candle:nth-child(1) .flame {
      animation:
        flame-light 0.2s ease 0.52s forwards,
        flicker 1.3s ease-in-out 0.72s infinite alternate;
    }

    .cake-button.lighting .candle:nth-child(2) .flame {
      animation:
        flame-light 0.2s ease 0.92s forwards,
        flicker 1.12s ease-in-out 1.12s infinite alternate;
    }

    .cake-button.lighting .candle:nth-child(3) .flame {
      animation:
        flame-light 0.2s ease 1.3s forwards,
        flicker 1.38s ease-in-out 1.5s infinite alternate;
    }

    .cake-button.lit .candle:nth-child(1) .flame {
      opacity: 1;
      animation: flicker 1.3s ease-in-out infinite alternate;
    }

    .cake-button.lit .candle:nth-child(2) .flame {
      opacity: 1;
      animation: flicker 1.12s ease-in-out infinite alternate;
      animation-delay: 0.08s;
    }

    .cake-button.lit .candle:nth-child(3) .flame {
      opacity: 1;
      animation: flicker 1.38s ease-in-out infinite alternate;
      animation-delay: 0.16s;
    }

    .smoke {
      position: absolute;
      left: 50%;
      top: -10px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(239, 239, 239, 0.75), rgba(239, 239, 239, 0));
      opacity: 0;
      transform: translateX(-50%) scale(0.3);
      pointer-events: none;
    }

    .cake-button.blown .flame {
      opacity: 0;
      transform: translateX(-50%) translateY(-12px) scale(0.18);
      filter: blur(3px);
      transition: transform 0.45s ease, opacity 0.35s ease, filter 0.35s ease;
      animation: none;
    }

    .cake-button.blown .smoke {
      animation: smoke-rise 1.2s ease-out forwards;
    }

    .cake-button.blown .cake-scene {
      animation: cake-celebrate 0.85s ease;
    }

    .matchstick {
      position: absolute;
      left: 50%;
      bottom: -4px;
      width: 142px;
      height: 30px;
      opacity: 0;
      transform: translate(-50%, 0) scale(1) rotate(-7deg);
      transform-origin: 50% 100%;
      z-index: 3;
    }

    .cake-button.show-match .matchstick {
      opacity: 1;
      transform: translate(-50%, 0) scale(1) rotate(-7deg);
      animation: none;
    }

    .cake-button.intro-ready .matchstick {
      opacity: 1;
      transform: translate(-50%, 0) scale(1) rotate(-7deg);
      animation: matchstick-idle 1.9s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(255, 196, 92, 0.38));
    }

    .cake-button.lighting .matchstick {
      animation: matchstick-sweep 1.9s ease forwards;
      filter: drop-shadow(0 0 18px rgba(255, 183, 92, 0.5));
      z-index: 6;
    }

    .cake-button.lit .matchstick,
    .cake-button.blown .matchstick {
      opacity: 0;
      transform: translate(-50%, -18px) scale(0.88) rotate(-24deg);
      pointer-events: none;
    }

    .matchstick-stick {
      position: absolute;
      left: 12px;
      top: 10px;
      width: 108px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe7b6, #d39a52);
      box-shadow:
        inset 0 -1px 0 rgba(111, 63, 18, 0.22),
        0 4px 10px rgba(85, 46, 18, 0.16);
    }

    .matchstick-head {
      position: absolute;
      right: 6px;
      top: 5px;
      width: 24px;
      height: 18px;
      border-radius: 10px 10px 8px 8px;
      background: linear-gradient(180deg, #e96b5d, #962930);
      box-shadow:
        inset 0 -2px 0 rgba(90, 18, 24, 0.28),
        0 2px 6px rgba(112, 29, 35, 0.22);
    }

    .matchstick-flame {
      position: absolute;
      right: 7px;
      top: -20px;
      width: 22px;
      height: 28px;
      opacity: 0;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(circle at 50% 62%, rgba(255, 245, 194, 0.98) 0 20%, transparent 22%),
        radial-gradient(circle at 50% 62%, rgba(255, 198, 77, 0.98) 0 54%, rgba(255, 111, 58, 0.92) 72%, transparent 74%);
      filter: drop-shadow(0 0 8px rgba(255, 174, 81, 0.58));
    }

    .cake-button.lighting .matchstick-flame {
      animation: matchstick-flame 1.58s linear forwards;
    }

    .cake-tip {
      margin-top: 14px;
      font-size: 0.95rem;
      color: rgba(112, 79, 102, 0.9);
      letter-spacing: 0.03em;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      pointer-events: none;
      padding: max(22px, env(safe-area-inset-top)) 16px 16px;
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .overlay.ready {
      opacity: 1;
    }

    .transition-stage {
      position: fixed;
      inset: 0;
      z-index: 5;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 54%, rgba(255, 247, 252, 0.36), transparent 20%),
        radial-gradient(circle at 34% 42%, rgba(255, 196, 226, 0.22), transparent 22%),
        radial-gradient(circle at 68% 38%, rgba(198, 228, 255, 0.2), transparent 22%);
    }

    .transition-stage.active {
      opacity: 1;
      visibility: visible;
    }

    .transition-halo,
    .transition-flash {
      position: absolute;
      left: 50%;
      top: 58%;
      width: 24vmin;
      height: 24vmin;
      min-width: 180px;
      min-height: 180px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.2);
      opacity: 0;
    }

    .transition-stage.active .transition-halo {
      animation: transition-halo 2.2s ease forwards;
    }

    .transition-stage.active .transition-flash {
      animation: transition-flash 2s ease forwards;
    }

    .transition-halo {
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.92) 0 18%, rgba(255, 214, 232, 0.8) 36%, rgba(255, 169, 203, 0.38) 56%, transparent 74%);
      filter: blur(4px);
    }

    .transition-flash {
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.98) 0 14%, rgba(255, 240, 247, 0.84) 30%, rgba(255, 215, 230, 0.42) 52%, transparent 72%);
      mix-blend-mode: screen;
    }

    .transition-rays {
      position: absolute;
      inset: 0;
    }

    .transition-rays span {
      position: absolute;
      left: 50%;
      top: 58%;
      width: min(44vw, 320px);
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.95), rgba(255, 182, 213, 0.85), transparent);
      opacity: 0;
      transform-origin: 0 50%;
    }

    .transition-stage.active .transition-rays span {
      animation: transition-ray 1.45s ease forwards;
    }

    .transition-rays span:nth-child(1) {
      transform: translate(-10%, -50%) rotate(10deg);
      animation-delay: 0.06s;
    }

    .transition-rays span:nth-child(2) {
      transform: translate(-10%, -50%) rotate(42deg);
      animation-delay: 0.14s;
    }

    .transition-rays span:nth-child(3) {
      transform: translate(-10%, -50%) rotate(74deg);
      animation-delay: 0.22s;
    }

    .transition-rays span:nth-child(4) {
      transform: translate(-10%, -50%) rotate(108deg);
      animation-delay: 0.1s;
    }

    .transition-rays span:nth-child(5) {
      transform: translate(-10%, -50%) rotate(140deg);
      animation-delay: 0.18s;
    }

    .transition-rays span:nth-child(6) {
      transform: translate(-10%, -50%) rotate(174deg);
      animation-delay: 0.26s;
    }

    .transition-sparks {
      position: absolute;
      inset: 0;
    }

    .transition-sparks span {
      position: absolute;
      left: 50%;
      top: 58%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.96), rgba(244, 124, 168, 0.92) 58%, transparent 70%);
      opacity: 0;
      box-shadow: 0 0 18px rgba(255, 190, 219, 0.62);
    }

    .transition-stage.active .transition-sparks span {
      animation: transition-spark 1.7s ease forwards;
    }

    .transition-sparks span:nth-child(1) {
      --dx: -180px;
      --dy: -140px;
      animation-delay: 0.08s;
    }

    .transition-sparks span:nth-child(2) {
      --dx: -110px;
      --dy: -196px;
      animation-delay: 0.16s;
    }

    .transition-sparks span:nth-child(3) {
      --dx: 12px;
      --dy: -220px;
      animation-delay: 0.04s;
    }

    .transition-sparks span:nth-child(4) {
      --dx: 116px;

    .transition-char {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1em;
      opacity: 0;
      transform: translateY(26px) scale(0.48);
      filter: blur(16px);
      text-shadow:
        0 0 18px rgba(255, 250, 252, 0.82),
        0 0 34px rgba(255, 194, 224, 0.72),
        0 0 74px rgba(197, 226, 255, 0.58);
      transition:
        opacity 0.26s ease,
        transform 0.34s cubic-bezier(0.18, 0.88, 0.22, 1),
        filter 0.3s ease,
        text-shadow 0.34s ease;
    }

    .transition-char::before,
    .transition-char::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.34s ease, transform 0.42s ease;
    }

    .transition-char::before {
      width: 1.9em;
      height: 1.9em;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.96) 0 16%, rgba(255, 220, 234, 0.92) 28%, rgba(191, 226, 255, 0.42) 52%, rgba(255, 217, 145, 0.22) 68%, transparent 76%);
      transform: translate(-50%, -50%) scale(0.2);
      filter: blur(6px);
    }

    .transition-char::after {
      width: 2.6em;
      height: 2.6em;
      border-radius: 50%;
      border: 1px solid rgba(255, 240, 246, 0.8);
      box-shadow:
        0 0 22px rgba(255, 192, 221, 0.72),
        0 0 44px rgba(191, 226, 255, 0.52);
      transform: translate(-50%, -50%) scale(0.14);
    }

    .transition-char.is-visible {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0) scale(1.28);
      text-shadow:
        0 0 22px rgba(255, 252, 253, 0.99),
        0 0 54px rgba(255, 191, 223, 0.99),
        0 0 100px rgba(197, 226, 255, 0.88),
        0 0 144px rgba(255, 222, 144, 0.42),
        0 20px 36px rgba(207, 111, 155, 0.28);
    }

    .transition-char.is-visible::before {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    .transition-char.is-visible::after {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.06);
    }

    .transition-char.is-settled {
      transform: translateY(0) scale(1);
      text-shadow:
        0 0 18px rgba(255, 250, 252, 0.98),
        0 0 40px rgba(255, 194, 224, 0.96),
        0 0 86px rgba(197, 226, 255, 0.82),
        0 0 124px rgba(255, 222, 144, 0.28),
        0 20px 36px rgba(207, 111, 155, 0.2);
    }

    .transition-char.is-settled::before {
      opacity: 0.55;
      transform: translate(-50%, -50%) scale(0.9);
    }

    .transition-char.is-settled::after {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1.34);
    }

    async function resumeAudioContext() {
      const audioContext = ensureAudioContext();
      if (audioContext && audioContext.state === "suspended") {
        try {
          const resumed = await Promise.race([
            audioContext.resume().then(() => true).catch(() => false),
            new Promise((resolve) => window.setTimeout(() => resolve(false), 180))

          if (!resumed) {

    function stopBirthdayFallback() {

        musicState.introFallbackTimer = 0;
      }

    function playBirthdayFallbackPhrase() {
      const audioContext = ensureAudioContext();
      if (!audioContext || audioContext.state !== "running") {
        return 0;
      }

      const beatDuration = 0.34;
      let cursor = audioContext.currentTime + 0.04;

      birthdayFallbackScore.forEach((step) => {
        const duration = step.beat * beatDuration;
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(noteFrequencies[step.note], cursor);

        gainNode.gain.setValueAtTime(0.0001, cursor);
        gainNode.gain.linearRampToValueAtTime(0.08, cursor + 0.03);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, cursor + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(cursor);
        oscillator.stop(cursor + duration + 0.03);

        cursor += duration + 0.03;
      });

      return cursor - audioContext.currentTime;
    }

    function playTransitionTextBurst() {
      resetTransitionTextBurst();
      transitionCopy.classList.add("bursting");
      transitionCopy.style.opacity = "1";
      transitionCopy.style.filter = "blur(0px)";
      transitionCopy.style.transform = "translate(-50%, -50%) scale(0.92)";

      const chars = transitionText.split("");
      const startDelay = 460;
      const charInterval = 430;
      const settleDelay = 300;
      const heartDelay = startDelay + chars.length * charInterval + 260;
      const fadeDelay = heartDelay + 960;
      const hideDelay = fadeDelay + 520;

      chars.forEach((char, index) => {
        const span = document.createElement("span");
        span.className = "transition-char";
        span.textContent = char;
        transitionCopy.appendChild(span);

        transitionTimers.push(
          window.setTimeout(() => {
            span.classList.add("is-visible");

            transitionTimers.push(
              window.setTimeout(() => {
                span.classList.add("is-settled");
              }, settleDelay)
            );
          }, startDelay + index * charInterval)
        );

          });
        }, heartDelay)
      );

      transitionTimers.push(
        window.setTimeout(() => {
          transitionCopy.classList.add("fading");
        }, fadeDelay)
      );

      transitionTimers.push(
        window.setTimeout(() => {
          transitionCopy.style.opacity = "0";
          transitionCopy.style.filter = "blur(14px)";
          transitionCopy.style.transform = "translate(-50%, calc(-50% - 28px)) scale(1.12)";

      );

      return {
        heartDelay,
        fadeDelay,
        hideDelay
      };

    function getAnniversaryStats() {
      const today = new Date();
      const current = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const start = new Date(anniversaryStart.getFullYear(), anniversaryStart.getMonth(), anniversaryStart.getDate());
      const totalDays = Math.max(0, Math.floor((current - start) / 86400000));

      let years = current.getFullYear() - start.getFullYear();
      let months = current.getMonth() - start.getMonth();
      let days = current.getDate() - start.getDate();

      if (days < 0) {
        const previousMonthLastDay = new Date(current.getFullYear(), current.getMonth(), 0).getDate();
        days += previousMonthLastDay;
        months -= 1;
      }

      if (months < 0) {
        months += 12;
        years -= 1;
      }

      return {
        totalDays,
        years: Math.max(0, years),
        months: Math.max(0, months),
        days: Math.max(0, days)
      };
    }

      anniversaryModal.setAttribute("aria-hidden", "true");
    }

    async function loadLetterContent() {
      if (letterLoaded) {
        return;
      }

      letterContent.innerHTML = '<div class="letter-loading">正在展开信件...</div>';

      try {
        const response = await fetch("xin.docx", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("load failed");
        }

        const buffer = await response.arrayBuffer();
        const text = new TextDecoder("utf-8").decode(buffer).trim();

        if (!text) {
          throw new Error("empty letter");
        }

        letterContent.textContent = text;
        letterLoaded = true;
      } catch (error) {
        letterContent.innerHTML = '<div class="letter-error">信件暂时还没准备好，你也可以先打开下方的 <code>xin.docx</code> 看看。</div>';
      }
    }

    function openLetterModal() {
      if (!celebrationStarted) {
        return;
      }

      letterModal.classList.add("open");
      letterModal.setAttribute("aria-hidden", "false");
      loadLetterContent();
    }

    function closeLetterModal() {
      letterModal.classList.remove("open");
      letterModal.setAttribute("aria-hidden", "true");
    }

    function stopLetterTyping() {
      letterTypingToken += 1;
      if (letterTypingTimer) {
        clearTimeout(letterTypingTimer);
        letterTypingTimer = 0;
      }
      letterContent.classList.remove("typing");
    }

    function getTypingDelay(character) {
      if (character === "\n") {
        return 220;
      }

      if ("\uff0c\u3002\uff01\uff1f\uff1b\uff1a".includes(character)) {
        return 145;
      }

      if (/\s/.test(character)) {
        return 18;
      }

      if (/[a-zA-Z0-9]/.test(character)) {
        return 24;
      }

      return 42;
    }

    /*
    function getTypingDelay(character) {
      if (character === "\n") {
        return 220;
      }

      if ("，。！？；：".includes(character)) {
        return 145;
      }

      if (/\s/.test(character)) {
        return 18;
      }

      if (/[a-zA-Z0-9]/.test(character)) {
        return 24;
      }

      return 42;
    }

    */
    function startLetterTyping(text) {
      stopLetterTyping();
      letterContent.textContent = "";
      letterContent.scrollTop = 0;
      letterContent.classList.add("typing");

      const currentToken = letterTypingToken;
      let index = 0;

      const typeNext = () => {
        if (currentToken !== letterTypingToken || !letterModal.classList.contains("open")) {
          return;
        }

        index += 1;
        letterContent.textContent = text.slice(0, index);
        letterContent.scrollTop = letterContent.scrollHeight;

        if (index >= text.length) {
          letterContent.classList.remove("typing");
          letterTypingTimer = 0;
          return;
        }

        letterTypingTimer = window.setTimeout(typeNext, getTypingDelay(text[index - 1]));
      };

      typeNext();
    }

    async function loadLetterContent() {
      if (letterLoaded) {
        return letterText;
      }

      if (!letterLoadPromise) {
        letterLoadPromise = fetch("xin.docx", { cache: "no-store" })
          .then((response) => {
            if (!response.ok) {
              throw new Error("load failed");
            }

            return response.arrayBuffer();
          })
          .then((buffer) => {
            const text = new TextDecoder("utf-8").decode(buffer).trim();

            if (!text) {
              throw new Error("empty letter");
            }

            letterText = text;
            letterLoaded = true;
            return letterText;
          })
          .finally(() => {
            letterLoadPromise = null;
          });
      }

      return letterLoadPromise;
    }

    async function openLetterModal() {
      if (!celebrationStarted) {
        return;
      }

      closeAnniversaryModal();
      letterModal.classList.add("open");
      letterModal.setAttribute("aria-hidden", "false");
      stopLetterTyping();

      if (letterLoaded) {
        startLetterTyping(letterText);
        return;
      }

      letterContent.innerHTML = '<div class="letter-loading">正在展开信件...</div>';

      try {
        const text = await loadLetterContent();
        if (!letterModal.classList.contains("open")) {
          return;
        }

        startLetterTyping(text);
      } catch (error) {
        letterContent.innerHTML = '<div class="letter-error">信件暂时还没准备好，你也可以先打开下方的 <code>xin.docx</code> 看看。</div>';
      }
    }

    function closeLetterModal() {
      stopLetterTyping();
      letterModal.classList.remove("open");
      letterModal.setAttribute("aria-hidden", "true");
    }

    function startCakeIntroSequence() {
      cakeButton.disabled = true;
      cakeTip.textContent = "点亮蜡烛后，点击蛋糕熄灭蜡烛";
      cakeButton.classList.add(
        "intro-live",
        "show-shadow",
        "show-plate",
        "show-bottom",
        "show-middle",
        "show-top",
        "show-candles",
        "show-match",
        "intro-ready"
      );
      cakeIntroReady = true;
      cakeButton.disabled = false;
    }

    function resizeCanvas() {
      scale = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * scale);
      canvas.height = Math.floor(height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    class Particle {
      constructor(x, y, options) {
        this.x = x;
        this.y = y;
        this.vx = options.vx;
        this.vy = options.vy;
        this.size = options.size;
        this.life = options.life;
        this.maxLife = options.life;
        this.color = options.color;
        this.gravity = options.gravity;
        this.fade = options.fade;
        this.spark = options.spark;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += this.gravity * dt;
        this.vx *= 0.992;
        this.vy *= 0.992;
        this.life -= this.fade * dt;
        return this.life > 0;
      }

      draw() {
        const alpha = Math.max(this.life / this.maxLife, 0);
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        if (this.spark) {
          ctx.beginPath();
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 1.2;
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x - this.vx * 0.03, this.y - this.vy * 0.03);
          ctx.stroke();
        }
      }
    }

    class Rocket {
      constructor(startX, targetX, targetY, hue, explosionType = "standard") {
        this.x = startX;
        this.y = height + 10;
        this.targetX = targetX;
        this.targetY = targetY;
        this.color = hue;
        this.explosionType = explosionType;
        this.speed = random(520, 680);
        this.angle = Math.atan2(targetY - this.y, targetX - this.x);
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
        this.trail = [];
      }

      update(dt) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 6) {
          this.trail.shift();
        }

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        const reachedY = this.vy < 0 && this.y <= this.targetY;
        const passedTarget = (this.targetX - this.x) * this.vx <= 0;
        return !(reachedY || passedTarget);
      }

      draw() {
        ctx.globalAlpha = 0.85;
        for (let i = 0; i < this.trail.length; i += 1) {
          const point = this.trail[i];
          const alpha = (i + 1) / this.trail.length;
          ctx.beginPath();
          ctx.fillStyle = this.color;
          ctx.globalAlpha = alpha * 0.28;
          ctx.arc(point.x, point.y, 2 + alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.fillStyle = "#ffffff";
        ctx.arc(this.x, this.y, 2.4, 0, Math.PI * 2);
        ctx.fill();
      }

      explodeStandard() {
        const count = Math.floor(random(46, 78));
        for (let i = 0; i < count; i += 1) {
          const angle = (Math.PI * 2 * i) / count + random(-0.08, 0.08);
          const speed = random(70, 260);
          particles.push(new Particle(this.x, this.y, {
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: random(1.8, 3.8),
            life: random(0.8, 1.35),
            color: Math.random() > 0.14 ? this.color : palette[Math.floor(random(0, palette.length))],
            gravity: random(80, 170),
            fade: random(0.75, 1.12),
            spark: true
          }));
        }

        for (let i = 0; i < 18; i += 1) {
          particles.push(new Particle(this.x, this.y, {
            vx: random(-50, 50),
            vy: random(-50, 50),
            size: random(2.6, 4.8),
            life: random(0.2, 0.45),
            color: "#ffffff",
            gravity: 0,
            fade: 1.3,
            spark: false
          }));
        }
      }

      explodeHeartOutline(scaleMultiplier = 1) {
        const count = Math.floor(random(78, 96) * Math.max(scaleMultiplier, 1));
        const heartScale = Math.min(width, height) * 0.012 * scaleMultiplier;

        for (let i = 0; i < count; i += 1) {
          const t = (Math.PI * 2 * i) / count;
          const heartX = 16 * Math.pow(Math.sin(t), 3);
          const heartY =
            13 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t);
          const targetVX = heartX * heartScale;
          const targetVY = -heartY * heartScale;
          const velocityJitter = random(0.92, 1.08);

          particles.push(new Particle(
            this.x + random(-2.5, 2.5),
            this.y + random(-2.5, 2.5),
            {
              vx: targetVX * velocityJitter + random(-4, 4),
              vy: targetVY * velocityJitter + random(-4, 4),
              size: random(2.1, 3.5),
              life: random(1.2, 1.55),
              color: this.color,
              gravity: random(18, 36),
              fade: random(0.68, 0.85),
              spark: true
            }
          ));
        }

        const flashCount = scaleMultiplier > 1.3 ? 12 : 8;
        for (let i = 0; i < flashCount; i += 1) {
          particles.push(new Particle(this.x, this.y, {
            vx: random(-40, 40) * scaleMultiplier,
            vy: random(-40, 40) * scaleMultiplier,
            size: random(1.8, 3.4) * Math.min(scaleMultiplier, 1.6),
            life: random(0.18, 0.34) * Math.min(scaleMultiplier, 1.5),
            color: "#ffffff",
            gravity: 0,
            fade: 1.45,
            spark: false
          }));
        }
      }

      explode() {
        if (this.explosionType === "heart-outline") {
          this.explodeHeartOutline();
          return;
        }

        if (this.explosionType === "heart-outline-grand") {
          this.explodeHeartOutline(1.78);
          return;
        }

        this.explodeStandard();
      }
    }

    function launchFirework(x, y, explosionType = "standard") {
      const startX = random(width * 0.18, width * 0.82);
      const hue = palette[Math.floor(random(0, palette.length))];
      const targetY = Math.min(y, height * 0.72);
      rockets.push(new Rocket(startX, x, targetY, hue, explosionType));
    }

    function burstCluster(x, y, options = {}) {
      const {
        explosionType = "standard",
        amount = width < 700 ? 1 : 2
      } = options;

      for (let i = 0; i < amount; i += 1) {
        launchFirework(
          x + random(-40, 40),
          y + random(-35, 35),
          explosionType
        );
      }
    }

    function handlePointer(event) {
      if (!celebrationStarted || isAnyModalOpen()) {
        return;
      }

      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      burstCluster(x, y, {
        explosionType: "heart-outline",
        amount: 1
      });
    }

    function kickOffFireworks() {
      celebrationStarted = true;
      autoTimer = 1.2;
      messageOverlay.classList.add("ready");
      fireworksHint.classList.add("ready");
      letterButton.classList.add("visible");
      anniversaryButton.classList.add("visible");
      burstCluster(width * 0.32, height * 0.32);
      setTimeout(() => burstCluster(width * 0.64, height * 0.26), 280);
      setTimeout(() => burstCluster(width * 0.5, height * 0.42), 620);
    }

    function igniteCandles() {
      if (!cakeIntroReady || candlesLit || lighterLighting || cakeButton.classList.contains("blown")) {
        return;
      }

      lighterLighting = true;
      cakeButton.disabled = true;
      cakeButton.classList.remove("intro-ready");
      cakeButton.classList.add("lighting");
      cakeTip.textContent = "\u706b\u67f4\u6b63\u5728\u70b9\u4eae\u8721\u70db...";
      startBackgroundMusicOnce();

      window.setTimeout(() => {
        lighterLighting = false;
        candlesLit = true;
        cakeButton.disabled = false;
        cakeButton.classList.remove("lighting");
        cakeButton.classList.add("lit", "intro-ready");
        cakeTip.textContent = "\u70b9\u51fb\u86cb\u7cd5\uff0c\u5439\u706d\u8721\u70db";
      }, 1980);
    }

    /*
    function igniteCandles() {
      if (!cakeIntroReady || candlesLit || lighterLighting || cakeButton.classList.contains("blown")) {
        return;
      }

      lighterLighting = true;
      cakeButton.disabled = true;
      cakeButton.classList.remove("intro-ready");
      cakeButton.classList.add("lighting");
      cakeTip.textContent = "火柴正在点亮蜡烛...";
      startBackgroundMusicOnce();

      window.setTimeout(() => {
        lighterLighting = false;
        candlesLit = true;
        cakeButton.disabled = false;
        cakeButton.classList.remove("lighting");
        cakeButton.classList.add("lit", "intro-ready");
        cakeTip.textContent = "点击蛋糕，熄灭蜡烛";
      }, 1980);
    }

    */
    function handleCakeSceneClick(event) {
      if (!cakeIntroReady || lighterLighting) {
        return;
      }

      const clickedLighter = event.target.closest(".matchstick");

      if (!candlesLit) {
        if (clickedLighter) {
          igniteCandles();
        }
        return;
      }

      if (clickedLighter) {
        return;
      }

      blowCandles();
    }

    function blowCandles() {
      if (!cakeIntroReady || !candlesLit || cakeButton.classList.contains("blown") || cakeTransitioning) {
        return;
      }

      cakeTransitioning = true;
      cakeButton.classList.add("blown");
      cakeButton.disabled = true;
      resetTransitionTextBurst();
      transitionStage.classList.remove("active");
      void transitionStage.offsetWidth;
      transitionStage.classList.add("active");
      const transitionTimings = playTransitionTextBurst();
      introScreen.classList.add("cinematic-exit");

      setTimeout(() => {
        introScreen.classList.add("exit");
      }, transitionTimings.fadeDelay + 160);

      setTimeout(() => {
        kickOffFireworks();
        transitionStage.classList.remove("active");
        resetTransitionTextBurst();
      }, transitionTimings.hideDelay + 720);
    }

    function animate(timestamp) {
      if (!lastTime) {
        lastTime = timestamp;
      }
      const dt = Math.min((timestamp - lastTime) / 1000, 0.033);
      lastTime = timestamp;

      ctx.fillStyle = celebrationStarted ? "rgba(255, 226, 236, 0.22)" : "rgba(255, 236, 244, 0.5)";
      ctx.fillRect(0, 0, width, height);

      if (celebrationStarted) {
        autoTimer += dt;
        if (autoTimer > 1.4) {
          autoTimer = 0;
          burstCluster(random(width * 0.18, width * 0.82), random(height * 0.18, height * 0.52));
        }
      }

      for (let i = rockets.length - 1; i >= 0; i -= 1) {
        const rocket = rockets[i];
        const alive = rocket.update(dt);
        rocket.draw();
        if (!alive) {
          rocket.explode();
          rockets.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const particle = particles[i];
        const alive = particle.update(dt);
        particle.draw();
        if (!alive) {
          particles.splice(i, 1);
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    resizeCanvas();
    ctx.fillStyle = "#fff4f8";
    ctx.fillRect(0, 0, width, height);
    startCakeIntroSequence();

    cakeButton.addEventListener("click", handleCakeSceneClick);
    canvas.addEventListener("pointerdown", handlePointer, { passive: true });
    letterButton.addEventListener("click", openLetterModal);
    anniversaryButton.addEventListener("click", openAnniversaryModal);
    letterClose.addEventListener("click", closeLetterModal);
    anniversaryClose.addEventListener("click", closeAnniversaryModal);
    letterModal.addEventListener("click", (event) => {
      if (event.target === letterModal) {
        closeLetterModal();
      }
    });
    anniversaryModal.addEventListener("click", (event) => {
      if (event.target === anniversaryModal) {
        closeAnniversaryModal();
      }
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeLetterModal();
        closeAnniversaryModal();
      }
    });
    window.addEventListener("resize", resizeCanvas);

    requestAnimationFrame(animate);
  </script>
